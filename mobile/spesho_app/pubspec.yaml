name: spesho_app
description: Spesho Products Management System - Grain Stock & Sales
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.3
  open_filex: ^4.4.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
